<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="static/jquery-3.6.1.min.js"></script>
    <script src="static/react.development.js"></script>
    <script src="static/react-dom.development.js"></script>
    <link href="static/bootstrap-5.3.8-dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="static/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
    <title>Fast Search</title>
    <style>
        
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #47515c;}
        #results { margin-top: 20px; }
        #results table { width: 100%; border-collapse: collapse; }
        #results th, #results td { padding: 8px; border: 1px solid #eee; text-align: left;}
        #results th { background: #495057; color:#daf1fa;font-weight: bold;}
        h2 {
            color: #e0e0e0;
            font-size: 48px;
            border-bottom-width: 1px;
            border-bottom-style: solid
        }
        .warn {color: #ffc107}
        .name { font-weight: bold; }
        .type { font-style: italic; color: #dbdbdb; }
        .brief { color: #555; }
    </style>
    <style>
        :root {
        --bs-body-bg: #1a1a1b;
        --bs-body-bg: transparent;
        --unique-color: #af6025;
        --divination-color: #0ebaff;
        --prophecy-color: #b54bff;
        --quest-color: #4ae63a;
        --currency-color: #aa9e82;
        --gem-color: #1ba29b;
        --cold-color: #366492;
        --afflictionmod-color: #16191c;
        --heist-color: #191e19;
        --lightning-color: #ffd700;
        --magic-color: #8888ff;
        --rare-color: #ffff77;
        --green-color: #46a239;
        --chaos-color: #d02090;
        --fire-color: #960000;
        --title-color: #e7b478;
        --legacy-color: #d4913f;
        --normal-color: #c8c8c8;
        --corrupted-color: #d20000;
        --scourged-color: #ff6e25;
        --default-color: #7f7f7f;
        --fractured-color: #a29162;
        --crafted-color: #b4b4ff;
        --dark-color: #0f0f0f;
        --craftaffectwarning-color: #ebc850;
        --coolgrey-700: 209, 18%, 30%;
        --yellow-300: 50, 98%, 64%
    }
    .gem_red {
        color: var(--corrupted-color)
    }

    .explicitMod,
    .implicitMod,
    .magicitem {
        color: var(--magic-color)
    }

    .explicitMod,
    .implicitMod {
        font-family: "FontinSmallCaps", "Fontin SmallCapsa", Verdana, Arial, Helvetica, sans-serif;
        line-height: 1.3
    }

    .item_currency,
    .currencyitem,
    .StackableCurrency {
        color: var(--currency-color)
    }

    .normal {
        font-weight: normal;
        font-style: normal
    }

    .item_description {
        color: var(--default-color)
    }

    .map_notinatlas {
        color: var(--normal-color)
    }

    .mod-value {
        color: white
    }

    .separator {
        height: 7.91075px;
        margin: 1px 0px
    }
    .fractured {
        color: var(--fractured-color)
    }
    .enchanted {
        color: #b8daf2
    }

    .uniqueName,
    .uniqueTypeLine,
    .uniqueitem {
        color: #ef6916
    }

    .rareitem {
        color: var(--rare-color)
    }

    .magicitem {
        color: var(--magic-color)
    }

    .whiteitem {
        color: var(--normal-color)
    }

    .normal {
        color: var(--normal-color)
    }

    .gemitem {
        color: var(--gem-color)
    }

    .currencyitem {
        color: var(--currency-color)
    }

    .corrupted {
        color: var(--corrupted-color)
    }

    .divination,
    .DivinationCard {
        color: var(--divination-color)
    }
        .secondary {
        color: #5382a1
    }

    .default {
        color: #7f7f7f
    }

    .augmented {
        color: var(--magic-color)
    }
    </style>
</head>
<body  data-bs-theme="dark">
    <h2>Search</h2>
    <div class="input-group">
        <input class="form-control" type="text" id="searchInput" width="100%" height="40px" autocomplete="off" />
        <button class="btn btn-outline-danger" type="button" onclick="resetSearch()"> Reset</button>
    </div>
    <div id="results"></div>
    <hr class="divider">
    <div data-bs-toggle="collapse" href="#data_info" role="button" aria-expanded="false" aria-controls="data_info">All data from poedb.tw and poe.ninja</div>
    <div id="data_info" class="collapse"></div>
    <script>
        // Simulated items
        var items = [];
        var price_values = {};
        var last_update = [];
        

        load_db('cards')
        load_db('uniques')
        load_price('prices')
        const input = document.getElementById('searchInput');
        const resultsDiv = document.getElementById('results');

        function get_name_html(item){
            if (item.type === 'card')
            {
                return `<span class="divination">${item.name}</span>`;
            }
            else if (item.type === 'unique')
            {
                return `<span class="uniqueitem">${item.name}</span><span class="uniqueitem">${item.basetype}</span>`;
            }
            else
            {
                return `${item.name}`;
            }
        }
        function get_price_html(item){
            return `<span class=\"currencyitem\">${price_values[item.name]||''}</span>`;
        }

        input.addEventListener('input', function() {
            const query = input.value.trim().toLowerCase();
            resultsDiv.innerHTML = '';
            if (query.length < 2) {
                return;
            }
            const matches = items.filter(item => item.name.toLowerCase().includes(query)).slice(0,10);
            if (matches.length === 0) {
                resultsDiv.innerHTML = '<div class="warn">No results found.</div>';
                return;
            }
            const table = document.createElement('table');
            table.className="table table-striped table-dark";
            table.innerHTML = `
                <thead>
                    <tr><th>Name</th><th>Type</th><th>Brief</th><th>Price</th></tr>
                </thead>
                <tbody>
                    ${matches.map(item =>
                        `<tr>
                            <td class="name">${get_name_html(item)}</td>
                            <td class="type">${item.type}</td>
                            <td class="brief">${item.brief}</td>
                            <td class="brief">${get_price_html(item)}</td>
                        </tr>`
                    ).join('')}
                </tbody>
            `;
            resultsDiv.appendChild(table);
        });

        function resetSearch() {
            input.value = '';
            resultsDiv.innerHTML = '';
            input.focus();
        }
        
        function updateTimes(name, time) {
            last_update.push({'name': name, 'time': time});
            const dataInfoDiv = document.getElementById('data_info');
            // Build tooltip text
            const text = last_update.map(item =>
                `${item.name}: ${new Date(item.time * 1000).toLocaleString()}`
            ).join('<br>');
            dataInfoDiv.innerHTML = text || '';
        }
        
        function retrive_data(name,callback){
            fetch(`poedb/${name}.json`)
            .then(response => {
                if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(callback)
            .catch(error => console.error('Error:', error));
        }
        
        function load_db(name){
            retrive_data(name,data => {
                console.log(data);
                items=items.concat(data.data);
                last_update[name]=data.last_update;
                updateTimes(name,data.last_update);
            })
        }
        
        function load_price(name){
            retrive_data(name,data => {
                console.log(data);
                data.items.forEach(x => {
                    if (x.links){
                        return;
                    }
                    price_values[x.name] = `${x.divines}`;
                });
                updateTimes(name,data.last_update);
            })
        }
    </script>
</body>
</html>
